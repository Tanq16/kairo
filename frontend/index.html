<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairō</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Icons & Libs -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script type="module">
        import {CodeJar} from 'https://cdn.jsdelivr.net/npm/codejar@3.7.0/codejar.min.js';
        window.CodeJar = CodeJar;
    </script>

    <link rel="stylesheet" href="/css/style.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        rosewater: '#f5e0dc', flamingo: '#f2cdcd', pink: '#f5c2e7', mauve: '#cba6f7',
                        red: '#f38ba8', maroon: '#eba0ac', peach: '#fab387', yellow: '#f9e2af',
                        green: '#a6e3a1', teal: '#94e2d5', sky: '#89dceb', sapphire: '#74c7ec',
                        blue: '#89b4fa', lavender: '#b4befe', text: '#cdd6f4', subtext1: '#bac2de',
                        subtext0: '#a6adc8', overlay2: '#9399b2', overlay1: '#7f849c', surface1: '#45475a',
                        surface0: '#313244', base: '#1e1e2e', mantle: '#181825', crust: '#11111b',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-crust text-text font-sans antialiased h-screen flex overflow-hidden">

    <!-- Mobile Header -->
    <div class="md:hidden fixed top-0 w-full h-14 bg-crust border-b border-surface0 z-50 flex items-center px-4 justify-between">
        <button id="mobile-menu-btn" class="text-subtext0"><i data-lucide="menu"></i></button>
        <span class="font-bold text-mauve">Kairō</span>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-crust flex flex-col fixed md:relative h-full z-40 transform -translate-x-full md:translate-x-0 border-r border-surface0">
        <div class="h-14 flex items-center justify-between px-4 border-b border-surface0 shrink-0">
            <span class="font-bold text-mauve hidden md:block">Kairō</span>
            <button id="add-btn" class="p-1 hover:text-green"><i data-lucide="plus"></i></button>
        </div>
        <div id="file-tree" class="flex-1 overflow-y-auto p-2 custom-scrollbar"></div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

    <!-- Main -->
    <main class="flex-1 flex flex-col h-full bg-crust pt-14 md:pt-0 min-w-0">
        <!-- Toolbar -->
        <div class="h-14 border-b border-surface0 flex items-center justify-between px-6 bg-crust/95 backdrop-blur z-20 shrink-0">
            <div class="flex items-center gap-3">
                <span id="current-filename" class="font-medium text-subtext1 truncate">Select a note...</span>
                <span id="unsaved-indicator" class="hidden text-yellow"><i data-lucide="save" class="animate-pulse w-4 h-4"></i></span>
            </div>
            <div class="flex items-center gap-3">
                <button id="toggle-view-btn" class="bg-surface0 px-3 py-1 rounded text-sm hover:bg-surface1">Toggle View</button>
                <button id="delete-btn" class="text-red hover:bg-red/10 p-2 rounded"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1 relative overflow-hidden flex">
            <!-- Edit Mode -->
            <div id="editor-container" class="absolute inset-0 z-10 bg-crust overflow-hidden hidden">
                <div id="editor" class="w-full h-full p-8 outline-none resize-none custom-scrollbar text-sm"></div>
            </div>

            <!-- Preview Mode -->
            <div id="preview-container" class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-12 pb-32">
                 <article id="markdown-body" class="markdown-body max-w-4xl mx-auto"></article>
            </div>
            
            <!-- TOC Sidebar -->
            <div id="toc-sidebar" class="hidden xl:block w-64 p-6 overflow-y-auto border-l border-surface0/30 opacity-0 transition-opacity">
                <div class="sticky top-0">
                    <h3 class="text-xs font-bold text-mauve mb-3 uppercase">Contents</h3>
                    <nav id="toc-nav" class="space-y-1 border-l-2 border-surface1 pl-4"></nav>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal-backdrop" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center backdrop-blur">
        <div class="bg-mantle border border-surface1 rounded-xl p-6 w-96">
            <h3 class="font-bold text-lavender mb-4">Create New</h3>
            <input type="text" id="new-item-input" class="w-full bg-surface0 border border-surface1 rounded px-3 py-2 mb-4 focus:outline-none focus:border-mauve" placeholder="Name (end with / for folder)">
            <div class="flex justify-end gap-2">
                <button id="modal-cancel" class="text-subtext0 px-3 py-1 hover:bg-surface0 rounded">Cancel</button>
                <button id="modal-confirm" class="bg-mauve text-base font-bold px-3 py-1 rounded">Create</button>
            </div>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
