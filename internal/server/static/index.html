<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairō</title>
    
    <!-- Fonts -->
    <link href="/static/css/inter.css" rel="stylesheet">
    <link href="/static/css/jetbrains-mono.css" rel="stylesheet">

    <!-- Icons & Libs -->
    <link rel="icon" type="image/svg+xml" href="/static/icons/favicon.svg">
    <script src="/static/js/lucide.min.js"></script>
    <script src="/static/js/tailwindcss.js"></script>
    <script src="/static/js/marked.min.js"></script>
    <script src="/static/js/dompurify.min.js"></script>
    <script src="/static/js/highlight.min.js"></script>
    <link id="hljs-dark" rel="stylesheet" href="/static/css/github-dark.min.css">
    <link id="hljs-light" rel="stylesheet" href="/static/css/github.min.css" disabled>
    <script>
        (function () {
            if (localStorage.getItem('kairo-theme') === 'light') {
                document.documentElement.classList.remove('dark');
                document.getElementById('hljs-dark').disabled = true;
                document.getElementById('hljs-light').disabled = false;
            }
        })();
    </script>
    <script src="/static/js/mermaid.min.js"></script>

    <script src="/static/js/codemirror-bundle.min.js"></script>

    <style>
        /* Catppuccin Mocha Theme */
        :root {
            --rosewater: #f5e0dc; --flamingo: #f2cdcd; --pink: #f5c2e7;
            --mauve: #cba6f7; --red: #f38ba8; --maroon: #eba0ac;
            --peach: #fab387; --yellow: #f9e2af; --green: #a6e3a1;
            --teal: #94e2d5; --sky: #89dceb; --sapphire: #74c7ec;
            --blue: #89b4fa; --lavender: #b4befe; --text: #cdd6f4;
            --subtext1: #bac2de; --subtext0: #a6adc8; --overlay2: #9399b2;
            --overlay1: #7f849c; --overlay0: #6c7086; --surface2: #585b70;
            --surface1: #45475a; --surface0: #313244;
            --base: #1e1e2e; --mantle: #181825; --crust: #11111b;
        }

        /* Catppuccin Latte — neutrals re-leveled for a white canvas */
        :root:not(.dark) {
            --rosewater: #dc8a78; --flamingo: #dd7878; --pink: #ea76cb;
            --mauve: #8839ef; --red: #d20f39; --maroon: #e64553;
            --peach: #fe640b; --yellow: #df8e1d; --green: #40a02b;
            --teal: #179299; --sky: #04a5e5; --sapphire: #209fb5;
            --blue: #1e66f5; --lavender: #7287fd; --text: #4c4f69;
            --subtext1: #5c5f77; --subtext0: #6c6f85; --overlay2: #7c7f93;
            --overlay1: #8c8fa1; --overlay0: #9ca0b0; --surface2: #ccd0da;
            --surface1: #dcdfe7; --surface0: #e9ecf1;
            --base: #ffffff; --mantle: #f5f6f9; --crust: #ffffff;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--crust); }
        ::-webkit-scrollbar-thumb { background: var(--surface0); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--surface1); }
        :root:not(.dark)::-webkit-scrollbar-thumb,
        :root:not(.dark) ::-webkit-scrollbar-thumb { background: var(--surface2); }
        :root:not(.dark)::-webkit-scrollbar-thumb:hover,
        :root:not(.dark) ::-webkit-scrollbar-thumb:hover { background: var(--overlay0); }

        /* Editor — CodeMirror container */
        #editor {
            background-color: var(--base);
            height: 100%;
        }
        #editor .cm-editor {
            height: 100%;
            outline: none;
        }
        #editor .cm-scroller {
            overflow: auto;
            padding: 2rem;
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            font-size: 16px;
            line-height: 1.4;
        }
        #editor .cm-content {
            caret-color: var(--text);
        }
        #editor .cm-gutters {
            display: none;
        }

        #print-pages { position: fixed; left: -10000px; top: 0; }
        .print-page {
            width: 216mm;
            height: 279mm;
            box-sizing: border-box;
            padding: 14mm 16mm;
            background: var(--base);
            overflow: hidden;
        }
        /* Layout-affecting print rules live outside @media print so the engine measures the exact layout that prints */
        .print-page pre, .print-page pre code { white-space: pre-wrap; word-break: break-word; }
        /* Inline code keeps tokens whole so table zoom accounts for full width; break-word is a layout-time last resort */
        .print-page code { overflow-wrap: break-word; }
        .print-page pre { overflow: hidden; }
        .print-page img { max-width: 100%; height: auto; max-height: 240mm; }
        .print-page table { max-width: 100%; }
        .print-page th, .print-page td { overflow-wrap: break-word; }
        .print-page .overflow-x-auto, .print-page .mermaid { overflow: visible; }
        .print-page .copy-code-btn { display: none !important; }
        .print-page .markdown-body { font-size: calc(16px * var(--print-scale, 1)); }
        /* Plain B&W export: recolor existing border sides only — adding a side shifts pagination */
        .print-plain .print-page { background: #fff !important; }
        .print-plain .print-page .markdown-body,
        .print-plain .print-page h1, .print-plain .print-page h2, .print-plain .print-page h3,
        .print-plain .print-page h4, .print-plain .print-page h5, .print-plain .print-page h6,
        .print-plain .print-page a,
        .print-plain .print-page blockquote,
        .print-plain .print-page .callout-icon { color: #000 !important; }
        .print-plain .print-page h1, .print-plain .print-page h2, .print-plain .print-page hr { border-color: #000 !important; }
        .print-plain .print-page table { border-color: #000 !important; }
        .print-plain .print-page th, .print-plain .print-page td { color: #000 !important; border-bottom-color: #000 !important; border-right-color: #000 !important; }
        .print-plain .print-page thead, .print-plain .print-page table tr:nth-child(2n) { background: transparent !important; }
        .print-plain .print-page .callout { background: transparent !important; }
        .print-plain .print-page pre { background: transparent !important; }
        .print-plain .print-page code { color: #000 !important; background: transparent !important; }
        .print-plain .print-page pre * { color: #000 !important; }
        .print-plain .print-page blockquote { border-left-color: #000 !important; }
        .print-plain .mermaid { background: transparent; }
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; transition: none !important; }
            @page { size: letter; margin: 0; }
            body > *:not(#print-pages) { display: none !important; }
            #print-pages { position: static; left: auto; }
            .print-page { break-after: page; page-break-after: always; }
            .print-page:last-child { break-after: auto; page-break-after: auto; }
        }

        /* Sidebar transitions */
        #sidebar {
            width: var(--sidebar-width, 21rem);
            transition: transform 0.2s ease-in-out, width 0.2s ease-in-out, margin-left 0.2s ease-in-out;
        }
        #sidebar.resizing { transition: none; }

        /* Desktop sidebar collapsed state */
        @media (min-width: 768px) {
            #sidebar.collapsed {
                width: 0;
                overflow: hidden;
            }
        }
        
        /* Desktop sidebar toggle icon rotation when collapsed */
        #desktop-sidebar-toggle.sidebar-collapsed i {
            transform: scaleX(-1);
        }

        .preview-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            column-gap: 3.5rem;
            align-items: start;
        }
        .preview-grid.toc-hidden {
            grid-template-columns: minmax(0, 1fr);
            column-gap: 0;
        }
        #markdown-body {
            width: 100%;
            max-width: 52rem;
            margin-inline: auto;
        }

        .toc-rail {
            position: sticky;
            top: 0;
            width: 13rem;
            align-self: start;
            max-height: calc(100vh - 4rem);
            overflow-y: auto;
            padding-bottom: 1rem;
        }
        .toc-link {
            display: block;
            font-size: 0.8125rem;
            color: var(--subtext0);
            border-left: 2px solid transparent;
            border-radius: 0 0.375rem 0.375rem 0;
            padding: 0.25rem 0.75rem;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .toc-link:hover { background-color: var(--surface0); color: var(--text); }
        .toc-link.active {
            color: var(--mauve);
            border-left-color: var(--mauve);
            background-color: var(--surface0);
        }
        .toc-h1 { padding-left: 0.75rem; }
        .toc-h2 { padding-left: 1.5rem; }
        .toc-h3 { padding-left: 2.25rem; }
        #toc-toggle.active {
            color: var(--mauve);
            background-color: var(--surface0);
        }
        @media (max-width: 767px) {
            .toc-rail, #toc-toggle { display: none !important; }
            .preview-grid { grid-template-columns: minmax(0, 1fr); column-gap: 0; }
        }
        /* breathing room for anchored TOC jumps at the scroll-container top */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { scroll-margin-top: 1rem; }

        /* Markdown rendering */
        .markdown-body {
            background-color: transparent !important;
            font-family: 'Inter', sans-serif !important;
            color: var(--subtext0) !important;
            line-height: 1.6;
            font-size: 16px;
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            padding-bottom: 0.3em;
        }
        
        .markdown-body h1 {
            border-bottom: 1px solid var(--surface0);
        }

        .markdown-body h2 {
            border-bottom: 1px solid rgb(from var(--surface0) r g b / 0.5);
        }

        .markdown-body h1 { font-size: 2em; color: var(--lavender) !important; }
        .markdown-body h2 { font-size: 1.5em; color: var(--mauve) !important; }
        .markdown-body h3 { font-size: 1.25em; color: var(--blue) !important; }
        .markdown-body h4 { font-size: 1em; font-weight: 600; color: var(--text); }
        .markdown-body h5 { font-size: 0.875em; font-weight: 600; color: var(--text); }
        .markdown-body h6 { font-size: 0.85em; color: var(--subtext0); }
        .markdown-body p { margin-bottom: 16px; }
        .markdown-body a { color: var(--blue); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }

        .markdown-body pre {
            background-color: var(--mantle) !important;
            border-radius: 0.75rem;
            padding: 1rem !important;
            margin-bottom: 16px;
            overflow-x: auto;
        }

        .markdown-body code {
            font-family: 'JetBrains Mono', monospace;
            color: var(--peach) !important;
            background-color: var(--surface0) !important;
            border-radius: 4px;
            padding: 0.2em 0.4em;
            font-size: 0.9375em;
        }
        .markdown-body pre code {
            color: inherit !important;
            background-color: transparent !important;
            padding: 0;
            font-size: 0.9375em;
            line-height: 1.5;
        }

        .markdown-body ul, .markdown-body ol {
            padding-left: 2em;
            margin-bottom: 16px;
        }
        .markdown-body ul { list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }
        .markdown-body li { margin-bottom: 0.25em; }

        .markdown-body table {
            display: table !important;
            width: 100% !important;
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid rgb(from var(--surface1) r g b / 0.5);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        .markdown-body table thead { background-color: rgb(from var(--mauve) r g b / 0.1); }
        .markdown-body table tr { background-color: transparent !important; border: none !important; }
        .markdown-body table tr:nth-child(2n) { background-color: rgb(from var(--surface0) r g b / 0.3) !important; }
        .markdown-body table th {
            color: var(--mauve) !important; font-weight: 600;
            border: none !important; border-bottom: 1px solid rgb(from var(--surface1) r g b / 0.5) !important;
            border-right: 1px solid rgb(from var(--surface0) r g b / 0.5); padding: 12px 16px !important; text-align: left;
        }
        .markdown-body table td {
            border: none !important; border-bottom: 1px solid rgb(from var(--surface0) r g b / 0.3) !important;
            border-right: 1px solid rgb(from var(--surface0) r g b / 0.3); color: var(--subtext0) !important;
            padding: 12px 16px !important; text-align: left;
        }
        .markdown-body table th:last-child, .markdown-body table td:last-child { border-right: none; }
        .markdown-body table tr:last-child td { border-bottom: none !important; }

        /* Wide tables scroll within the content column instead of overlapping the TOC */
        .markdown-body .table-scroll { overflow-x: auto; margin-bottom: 1.5rem; }
        .markdown-body .table-scroll > table { margin-bottom: 0; }

        /* Images scale with the preview pane; mermaid SVGs already do via their inline natural-width max-width */
        #markdown-body img { max-width: 100%; height: auto; }

        .markdown-body blockquote {
            border-left: 0.25em solid rgb(from var(--surface1) r g b / 0.5);
            padding: 0 1em;
            color: var(--subtext0);
            margin-bottom: 16px;
        }

        .markdown-body hr {
            border: none;
            border-top: 1px solid var(--surface0);
            margin: 1.5em 0;
        }

        .callout {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            background-color: rgb(from var(--surface0) r g b / 0.2);
        }
        .callout-icon { 
            display: inline-flex;
            align-items: center;
            flex-shrink: 0;
            line-height: 1;
            padding-top: 0.3em;
        }
        .callout-icon svg {
            width: 1em;
            height: 1em;
        }
        .callout-content { flex: 1; }
        .callout-content p { margin: 0 !important; }
        .callout.tip { background-color: rgb(from var(--green) r g b / 0.1); }
        .callout.tip .callout-icon { color: var(--green); }
        .callout.info { background-color: rgb(from var(--blue) r g b / 0.1); }
        .callout.info .callout-icon { color: var(--blue); }
        .callout.danger { background-color: rgb(from var(--red) r g b / 0.1); }
        .callout.danger .callout-icon { color: var(--red); }
        .callout.warning { background-color: rgb(from var(--peach) r g b / 0.1); }
        .callout.warning .callout-icon { color: var(--peach); }
        .callout.note { background-color: rgb(from var(--mauve) r g b / 0.1); }
        .callout.note .callout-icon { color: var(--mauve); }

        .mermaid {
            background-color: var(--mantle);
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1.5rem 0;
            text-align: center;
            overflow-x: auto;
        }

        /* Gantt chart fixes */
        body:not(.print-plain) .mermaid .grid .tick line {
            stroke: var(--surface0) !important;
            stroke-width: 0.5px !important;
            opacity: 0.5 !important;
        }
        body:not(.print-plain) .mermaid .grid .tick text {
            fill: var(--subtext0) !important;
        }
        body:not(.print-plain) .mermaid .grid path {
            stroke: var(--surface0) !important;
            stroke-width: 0.5px !important;
        }
        body:not(.print-plain) .mermaid .section {
            stroke: none !important;
        }
        body:not(.print-plain) .mermaid .section0, body:not(.print-plain) .mermaid .section2 {
            fill: var(--mantle) !important;
        }
        body:not(.print-plain) .mermaid .section1, body:not(.print-plain) .mermaid .section3 {
            fill: var(--base) !important;
        }
        body:not(.print-plain) .mermaid .today {
            stroke: var(--red) !important;
            stroke-width: 2px !important;
        }
        body:not(.print-plain) .mermaid .taskText {
            fill: var(--base) !important;
            font-size: 0.75em !important;
        }
        body:not(.print-plain) .mermaid .taskTextOutsideRight,
        body:not(.print-plain) .mermaid .taskTextOutsideLeft {
            fill: var(--text) !important;
        }
        body:not(.print-plain) .mermaid .sectionTitle {
            fill: var(--mauve) !important;
        }
        body:not(.print-plain) .mermaid .titleText {
            fill: var(--mauve) !important;
        }

        .copy-code-btn {
            position: absolute; top: 0.5rem; right: 0.5rem;
            padding: 0.5rem;
            background-color: rgb(from var(--surface0) r g b / 0.95);
            border-radius: 0.375rem;
            color: var(--subtext0);
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }
        pre { position: relative; }
        pre:hover .copy-code-btn { opacity: 1; }
        .copy-code-btn:hover { background-color: rgb(from var(--surface1) r g b / 1); color: var(--mauve); }
        .copy-code-btn.copied { color: var(--green); }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        rosewater: 'var(--rosewater)', flamingo: 'var(--flamingo)', pink: 'var(--pink)', mauve: 'var(--mauve)',
                        red: 'var(--red)', maroon: 'var(--maroon)', peach: 'var(--peach)', yellow: 'var(--yellow)',
                        green: 'var(--green)', teal: 'var(--teal)', sky: 'var(--sky)', sapphire: 'var(--sapphire)',
                        blue: 'var(--blue)', lavender: 'var(--lavender)', text: 'var(--text)', subtext1: 'var(--subtext1)',
                        subtext0: 'var(--subtext0)', overlay2: 'var(--overlay2)', overlay1: 'var(--overlay1)', overlay0: 'var(--overlay0)',
                        surface2: 'var(--surface2)', surface1: 'var(--surface1)', surface0: 'var(--surface0)',
                        base: 'var(--base)', mantle: 'var(--mantle)', crust: 'var(--crust)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-base text-text font-sans antialiased h-screen flex overflow-hidden">

    <!-- Mobile Header -->
    <div class="md:hidden fixed top-0 w-full h-14 bg-crust z-50 flex items-center px-4 justify-between">
        <button id="mobile-menu-btn" class="text-subtext0"><i data-lucide="menu"></i></button>
        <span class="font-bold text-mauve cursor-pointer" id="kairo-home-mobile">Kairō</span>
    </div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="bg-crust flex flex-col fixed md:relative h-full z-40 transform -translate-x-full md:translate-x-0 shrink-0 transition-all duration-200 md:overflow-visible overflow-hidden border-r border-surface0">
        <div class="h-14 flex items-center justify-between px-4 shrink-0">
            <span class="font-bold text-mauve hidden md:block cursor-pointer" id="kairo-home">Kairō</span>
            <div class="flex items-center gap-2">
                <button id="add-file-btn" class="p-1 hover:text-green" title="Create new file"><i data-lucide="file-plus"></i></button>
                <button id="add-folder-btn" class="p-1 hover:text-yellow" title="Create new folder"><i data-lucide="folder-plus"></i></button>
                <button id="move-btn" class="p-1 hover:text-blue hidden" title="Move/rename"><i data-lucide="replace"></i></button>
            </div>
        </div>
        <div id="file-tree" class="flex-1 overflow-y-auto p-2 custom-scrollbar drop-zone"></div>
        <div id="sidebar-resizer" class="hidden md:block absolute top-0 right-0 w-1 h-full cursor-col-resize hover:bg-mauve/40 z-50" title="Drag to resize"></div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

    <!-- Main -->
    <main class="flex-1 flex flex-col h-full bg-crust pt-14 md:pt-0 min-w-0">
        <!-- Toolbar -->
        <div class="h-14 flex items-center justify-between px-6 bg-crust z-20 shrink-0">
            <div class="flex items-center gap-3">
                <button id="desktop-sidebar-toggle" class="hidden md:flex p-1.5 rounded hover:bg-surface0 text-subtext0 hover:text-mauve transition-colors" title="Toggle Sidebar">
                    <i data-lucide="panel-left" class="w-4 h-4"></i>
                </button>
                <div id="current-filename" class="flex items-center font-medium text-subtext1 overflow-hidden whitespace-nowrap min-w-0"><span class="text-subtext0">Select a note...</span></div>
                <span id="unsaved-indicator" class="hidden text-yellow"><i data-lucide="save" class="animate-pulse w-4 h-4"></i></span>
                <span id="sync-status" class="w-2 h-2 rounded-full bg-overlay0 self-center" title="Live sync"></span>
            </div>
            <div class="flex items-center gap-3">
                <button id="search-btn" class="text-subtext0 hover:bg-surface0 hover:text-mauve p-2 rounded transition-colors" title="Search (Ctrl/Cmd+K)">
                    <i data-lucide="search" class="w-4 h-4"></i>
                </button>
                <button id="toc-toggle" class="text-subtext0 hover:bg-surface0 hover:text-mauve p-2 rounded transition-colors hidden" title="Toggle contents">
                    <i data-lucide="list" class="w-4 h-4"></i>
                </button>
                <button id="theme-toggle" class="text-subtext0 hover:bg-surface0 hover:text-mauve p-2 rounded transition-colors" title="Toggle theme">
                    <i data-lucide="sun" class="w-4 h-4"></i>
                </button>
                <button id="print-btn" class="text-subtext0 hover:bg-surface0 hover:text-mauve p-2 rounded transition-colors hidden" title="Print Document">
                    <i data-lucide="printer" class="w-4 h-4"></i>
                </button>
                <button id="preview-btn" class="bg-surface0 px-3 py-1 rounded text-sm hover:bg-surface1 flex items-center gap-2" title="Toggle preview">
                    <i data-lucide="eye" class="w-4 h-4"></i>
                    <span>Preview</span>
                </button>
                <button id="delete-btn" class="text-red hover:bg-surface0 p-2 rounded hidden" title="Delete"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1 relative overflow-hidden flex">
            <!-- Edit Mode -->
            <div id="editor-container" class="absolute inset-0 z-10 bg-crust overflow-hidden">
                <div id="editor" class="w-full h-full"></div>
            </div>

            <!-- Preview Mode -->
            <div id="preview-container" class="absolute inset-0 z-0 overflow-y-auto custom-scrollbar p-6 md:p-12 pb-32 hidden">
                <div class="preview-grid">
                    <article id="markdown-body" class="markdown-body"></article>
                    <nav id="toc-rail" class="toc-rail no-print hidden"></nav>
                </div>
            </div>
        </div>
    </main>

    <!-- Create Modal -->
    <div id="create-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center backdrop-blur">
        <div class="bg-mantle border border-surface1 rounded-xl p-6 w-96">
            <h3 class="font-bold text-lavender mb-4 flex items-center gap-2" id="create-modal-title">
                <i data-lucide="plus" class="w-5 h-5"></i>
                Create New
            </h3>
            <input type="text" id="create-input" class="w-full bg-surface0 border border-surface1 rounded px-3 py-2 mb-4 focus:outline-none focus:border-mauve" placeholder="Name">
            <div class="flex justify-end gap-2">
                <button id="create-cancel" class="text-subtext0 px-3 py-1 hover:bg-surface0 rounded">Cancel</button>
                <button id="create-confirm" class="bg-mauve text-base font-bold px-3 py-1 rounded">Create</button>
            </div>
        </div>
    </div>

    <!-- Move Modal -->
    <div id="move-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center backdrop-blur">
        <div class="bg-mantle border border-surface1 rounded-xl p-6 w-96">
            <h3 class="font-bold text-lavender mb-4 flex items-center gap-2">
                <i data-lucide="replace" class="w-5 h-5"></i>
                Move / Rename
            </h3>
            <div class="mb-4">
                <label for="move-current" class="text-sm text-subtext0 mb-1 block">Current Path</label>
                <input type="text" id="move-current" class="w-full bg-surface0 border border-surface1 rounded px-3 py-2 mb-3 focus:outline-none focus:border-mauve" readonly>
            </div>
            <div class="mb-4">
                <label for="move-new" class="text-sm text-subtext0 mb-1 block">New Path</label>
                <input type="text" id="move-new" class="w-full bg-surface0 border border-surface1 rounded px-3 py-2 focus:outline-none focus:border-mauve" placeholder="Enter new path or name">
            </div>
            <div class="flex justify-end gap-2">
                <button id="move-cancel" class="text-subtext0 px-3 py-1 hover:bg-surface0 rounded">Cancel</button>
                <button id="move-confirm" class="bg-mauve text-base font-bold px-3 py-1 rounded">Move</button>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="delete-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center backdrop-blur">
        <div class="bg-mantle border border-surface1 rounded-xl p-6 w-96">
            <h3 class="font-bold text-red mb-4 flex items-center gap-2">
                <i data-lucide="trash-2" class="w-5 h-5"></i>
                Delete Item
            </h3>
            <p class="text-subtext0 mb-2">Are you sure you want to delete:</p>
            <p id="delete-path" class="text-text font-mono text-sm bg-surface0 rounded px-3 py-2 mb-2 break-all"></p>
            <p class="text-subtext0 text-sm mb-4">Folders are deleted along with everything inside them.</p>
            <div class="flex justify-end gap-2">
                <button id="delete-cancel" class="text-subtext0 px-3 py-1 hover:bg-surface0 rounded">Cancel</button>
                <button id="delete-confirm" class="bg-red text-base font-bold px-3 py-1 rounded">Delete</button>
            </div>
        </div>
    </div>
    
    <!-- Print Modal -->
    <div id="print-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center backdrop-blur">
        <div class="bg-mantle border border-surface1 rounded-xl p-6 w-96">
            <h3 class="font-bold text-lavender mb-4 flex items-center gap-2">
                <i data-lucide="printer" class="w-5 h-5"></i>
                Print / Export PDF
            </h3>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <button id="print-styled-100" class="bg-surface0 hover:bg-surface1 rounded px-3 py-2 text-sm">Styled · 100%</button>
                <button id="print-plain-100" class="bg-surface0 hover:bg-surface1 rounded px-3 py-2 text-sm">Plain · 100%</button>
                <button id="print-styled-scaled" class="bg-surface0 hover:bg-surface1 rounded px-3 py-2 text-sm">Styled · Custom</button>
                <button id="print-plain-scaled" class="bg-surface0 hover:bg-surface1 rounded px-3 py-2 text-sm">Plain · Custom</button>
            </div>
            <div class="flex items-center gap-2 mb-4">
                <label for="print-scale-input" class="text-sm text-subtext0">Custom scale</label>
                <input type="number" id="print-scale-input" value="75" min="10" max="200" class="w-20 bg-surface0 border border-surface1 rounded px-2 py-1 focus:outline-none focus:border-mauve">
                <span class="text-sm text-subtext0">%</span>
            </div>
            <div class="flex justify-end gap-2">
                <button id="print-cancel" class="text-subtext0 px-3 py-1 hover:bg-surface0 rounded">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Search Modal -->
    <div id="search-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-start justify-center backdrop-blur pt-24">
        <div class="bg-mantle border border-surface1 rounded-xl w-[36rem] max-w-[90vw] overflow-hidden">
            <div class="flex items-center gap-2 px-4 py-3 border-b border-surface0">
                <i data-lucide="search" class="w-4 h-4 text-subtext0"></i>
                <input type="text" id="search-input" class="flex-1 bg-transparent focus:outline-none text-text" placeholder="Search notes by name or content...">
                <kbd class="text-xs text-overlay0 border border-surface1 rounded px-1.5 py-0.5">Esc</kbd>
            </div>
            <div id="search-results" class="max-h-80 overflow-y-auto custom-scrollbar"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 z-[60] hidden">
        <div class="bg-surface0 text-text px-4 py-2 rounded-lg shadow-lg border border-surface1">
            <span id="toast-message"></span>
        </div>
    </div>

    <script src="/static/js/render.js"></script>
    <script src="/static/js/print.js"></script>
    <script src="/static/js/editor.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/sync.js"></script>
    <script>
        // Initialize Lucide icons after page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
        } else {
            lucide.createIcons();
        }
    </script>
</body>
</html>
